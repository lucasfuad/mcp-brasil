name: Refresh Azure datasets cache

on:
  schedule:
    # Every Monday 03:00 UTC (00:00 BRT)
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      datasets:
        description: "Comma-separated dataset IDs (empty = all)"
        required: false
        default: ""

concurrency:
  group: azure-refresh-datasets
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_RG: rg-mcp-brasil
  STORAGE_ACCOUNT: mcpbrasildata51273
  SHARE_NAME: mcp-brasil-cache
  APP_NAME: api-mcp-brasil
  DEFAULT_DATASETS: spu_siapa,tse_candidatos,tse_bens,tse_votacao,tse_redes_sociais,tse_fefc

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python + deps
        run: |
          uv python install 3.13
          uv sync --group dev

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run warmup locally
        env:
          MCP_BRASIL_DATASETS: ${{ inputs.datasets != '' && inputs.datasets || env.DEFAULT_DATASETS }}
          MCP_BRASIL_DATASET_CACHE_DIR: ${{ github.workspace }}/.cache/mcp-brasil
          MCP_BRASIL_DATASET_REFRESH: force
          MCP_BRASIL_DATASET_TIMEOUT: "1800"
        run: uv run python scripts/warmup_datasets.py

      - name: List built cache
        run: ls -lh .cache/mcp-brasil/datasets/ || true

      - name: Upload to Azure Files
        run: |
          KEY=$(az storage account keys list -n "$STORAGE_ACCOUNT" -g "$AZURE_RG" \
            --query "[0].value" -o tsv)
          az storage file upload-batch \
            --destination "$SHARE_NAME" --destination-path datasets \
            --source .cache/mcp-brasil/datasets \
            --account-name "$STORAGE_ACCOUNT" --account-key "$KEY" \
            --pattern "*.duckdb" --no-progress
          az storage file upload-batch \
            --destination "$SHARE_NAME" --destination-path datasets \
            --source .cache/mcp-brasil/datasets \
            --account-name "$STORAGE_ACCOUNT" --account-key "$KEY" \
            --pattern "*.manifest.json" --no-progress

      - name: Restart Container App to pick up fresh cache
        run: |
          rev=$(az containerapp show -n "$APP_NAME" -g "$AZURE_RG" \
            --query "properties.latestReadyRevisionName" -o tsv)
          az containerapp revision restart -n "$APP_NAME" -g "$AZURE_RG" --revision "$rev"
